name: PR Tests

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate repository
        run: python3 scripts/validate_repo.py
      - name: Validate deploy script syntax
        run: bash -n scripts/deploy.sh

