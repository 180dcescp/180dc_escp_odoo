name: PR Tests

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate repository
        run: python3 ops/scripts/validate_repo.py
      - name: Validate addon discovery
        run: python3 ops/scripts/custom_modules.py --addons-dir addons --csv
