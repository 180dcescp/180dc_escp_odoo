services:
  odoo-db:
    image: postgres@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    container_name: odoo-local-db
    restart: unless-stopped
    env_file:
      - ./.local/odoo.env
    volumes:
      - odoo_local_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  odoo:
    image: odoo@sha256:3cebb4f94bebb27c6e8a7a2fc22efbc5adc68d60a33ec3055eff9bda857561b4
    container_name: odoo-local
    restart: unless-stopped
    depends_on:
      odoo-db:
        condition: service_healthy
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]
    env_file:
      - ./.local/odoo.env
    volumes:
      - odoo_local_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./.local/odoo.conf:/etc/odoo/odoo.conf:ro
    ports:
      - "8069:8069"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8069/web/login\", timeout=5)' >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  odoo_local_db_data:
  odoo_local_data:
